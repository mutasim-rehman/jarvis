<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset your JARVIS password</title>
</head>
<body style="margin:0;padding:0;background:#050505;font-family:'Segoe UI',system-ui,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#050505;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:520px;background:#0d0d0d;border:1px solid #2a1a10;border-radius:16px;">
          <tr>
            <td style="padding:32px;text-align:center;">
              <div style="display:inline-block;width:48px;height:48px;line-height:48px;border-radius:12px;background:linear-gradient(135deg,#f07a1f,#c85e0d);color:#050505;font-weight:800;font-size:22px;">J</div>
              <h1 style="margin:16px 0 0;color:#f7efe8;font-size:22px;">Reset your password</h1>
              <p style="color:#b39b86;font-size:15px;line-height:1.6;">Use the button below to choose a new password for your JARVIS account.</p>
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;margin-top:28px;padding:14px 28px;background:linear-gradient(180deg,#f07a1f,#c85e0d);color:#050505;text-decoration:none;font-weight:700;border-radius:10px;">Reset password</a>
              <p style="margin:24px 0 0;color:#7a6a5c;font-size:12px;">If you didn&apos;t request this, ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
