<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm your JARVIS account</title>
</head>
<body style="margin:0;padding:0;background:#050505;font-family:'Segoe UI',system-ui,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#050505;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#0d0d0d;border:1px solid #2a1a10;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:28px 32px 8px;text-align:center;">
              <div style="display:inline-block;width:48px;height:48px;line-height:48px;border-radius:12px;background:linear-gradient(135deg,#f07a1f,#c85e0d);color:#050505;font-weight:800;font-size:22px;">J</div>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 0;text-align:center;">
              <h1 style="margin:0;color:#f7efe8;font-size:22px;font-weight:700;">Welcome to JARVIS</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 0;color:#b39b86;font-size:15px;line-height:1.6;text-align:center;">
              Confirm your email to finish creating your account and sync preferences across devices.
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px;text-align:center;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;background:linear-gradient(180deg,#f07a1f,#c85e0d);color:#050505;text-decoration:none;font-weight:700;font-size:15px;border-radius:10px;">Confirm email</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px;color:#7a6a5c;font-size:12px;line-height:1.5;text-align:center;">
              If you didn&apos;t sign up, you can ignore this message.<br />
              Signed up as {{ .Email }}
            </td>
          </tr>
        </table>
        <p style="margin:20px 0 0;color:#5c4f44;font-size:11px;">JARVIS · Advanced systems assistant</p>
      </td>
    </tr>
  </table>
</body>
</html>
